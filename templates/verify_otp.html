{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">Verify OTP</h3>
                    <p class="text-muted text-center small">Enter the 6-digit code sent to your email.</p>
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-warning w-100">Verify OTP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        text-align: center;
        letter-spacing: 5px;
        font-weight: bold;
    }
</style>
{% endblock %}
